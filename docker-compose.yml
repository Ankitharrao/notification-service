# version: '3.8'

services:

  # ── PostgreSQL ────────────────────────────────
  # Our primary database
  # Stores notifications, users, templates, delivery logs
  postgres:
    image: postgres:16-alpine
    container_name: notification_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────
  # Used for rate limiting and caching
  # Token bucket per user per channel lives here
  redis:
    image: redis:7-alpine
    container_name: notification_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper ─────────────────────────────────
  # Kafka needs Zookeeper to manage brokers
  # Think of it as Kafka's coordinator
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: notification_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ─────────────────────────────────────
  # Message queue between core service and workers
  # Topics: notifications.email, sms, push, inapp
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: notification_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Kafka UI ──────────────────────────────────
  # Visual dashboard to inspect Kafka topics
  # Visit http://localhost:8080 to see messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: notification_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

# ── Volumes ───────────────────────────────────
# Named volumes persist data between restarts
# Without this, all data is lost when container stops
volumes:
  postgres_data:
  redis_data: